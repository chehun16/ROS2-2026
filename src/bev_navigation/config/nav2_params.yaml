# Nav2 파라미터 설정
# BEV Occupancy Map(/bev_map/occupancy)을 로컬 코스트맵에 연결하는 것이 핵심

# =============================================================================
# BT Navigator - 행동 트리 기반 네비게이션 조율
# =============================================================================
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10        # BT 실행 주기 (ms)
    default_server_timeout: 20
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator"

# =============================================================================
# Controller Server - 로봇 실제 이동 속도 명령 생성
# =============================================================================
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0   # 제어 주기 (Hz)
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25    # 목표 도달 허용 오차 (m)
      yaw_goal_tolerance: 0.25   # 방향 허용 오차 (rad)
      stateful: true

    # DWB (Dynamic Window Based) 컨트롤러 - TurtleBot3 기본
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true

      # TurtleBot3 Waffle 물리적 한계
      min_vel_x:   0.0
      max_vel_x:   0.26          # 최대 전진 속도 (m/s)
      min_vel_y:   0.0
      max_vel_y:   0.0           # 비홀로노믹 (좌우 이동 불가)
      max_vel_theta: 1.82        # 최대 회전 속도 (rad/s)
      min_speed_xy:  0.0
      max_speed_xy:  0.26
      min_speed_theta: 0.0

      acc_lim_x:     2.5         # 전진 가속도 한계
      acc_lim_y:     0.0
      acc_lim_theta: 3.2         # 회전 가속도 한계
      decel_lim_x:  -2.5
      decel_lim_y:   0.0
      decel_lim_theta: -3.2

      vx_samples:     20         # 속도 샘플링 수
      vy_samples:     5
      vtheta_samples: 20

      sim_time: 1.7              # 궤적 시뮬레이션 시간 (s)
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25

      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

# =============================================================================
# Local Costmap - 실시간 장애물 회피용 지도
# ★ 핵심: BEV 맵(/bev_map/occupancy)을 장애물 레이어로 사용
# =============================================================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      update_frequency: 5.0      # 코스트맵 갱신 주기 (Hz)
      publish_frequency: 2.0
      rolling_window: true       # 로봇 중심으로 이동하는 로컬 맵
      width: 10                  # 로컬 맵 크기 (m) - BEV 맵과 동일하게
      height: 10
      resolution: 0.05           # 셀 크기 (m) - BEV 맵과 동일하게

      robot_radius: 0.22         # TurtleBot3 Waffle 반경

      plugins: ["bev_obstacle_layer", "inflation_layer"]

      # BEV Occupancy Map 레이어 - 이 프로젝트의 핵심 연결
      bev_obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: bev_map_source
        bev_map_source:
          topic: /bev_map/pointcloud    # ← BEV 노드 PointCloud2 출력 (ObstacleLayer 호환)
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "PointCloud2"      # ObstacleLayer는 PointCloud2/LaserScan만 지원
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 9.5
          obstacle_min_range: 0.0

      # 장애물 주변 팽창 레이어 - 로봇이 장애물에 너무 가까이 가지 않도록
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

      always_send_full_costmap: true

# =============================================================================
# Global Costmap - 전체 경로 계획용 지도 (정적 맵 기반)
# =============================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link
      update_frequency: 1.0
      publish_frequency: 1.0
      robot_radius: 0.22
      resolution: 0.05

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      # SLAM으로 생성된 정적 맵
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      # BEV 맵을 글로벌 코스트맵에도 추가 (동적 장애물 반영)
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: bev_map_source
        bev_map_source:
          topic: /bev_map/occupancy
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "OccupancyGrid"
          raytrace_max_range: 10.0
          obstacle_max_range: 9.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

      always_send_full_costmap: true

# =============================================================================
# Planner Server - 글로벌 경로 계획 (A* 기반 NavFn)
# =============================================================================
planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5             # 목표 지점 도달 허용 오차
      use_astar: true            # A* 알고리즘 사용 (Dijkstra 대비 빠름)
      allow_unknown: true        # 미탐색 영역 통과 허용

# =============================================================================
# Smoother Server - 경로 곡선 부드럽게
# =============================================================================
smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# =============================================================================
# Behavior Server - 막혔을 때 복구 행동 (제자리 회전, 후진 등)
# =============================================================================
behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic:  local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic:  local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

# =============================================================================
# Waypoint Follower - 다중 경유지 이동 (선택적)
# =============================================================================
waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

# =============================================================================
# Velocity Smoother - 속도 명령 부드럽게 보간
# =============================================================================
velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.26, 0.0, 1.82]
    min_velocity: [-0.26, 0.0, -1.82]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# =============================================================================
# Lifecycle Manager - 노드 생명주기 관리
# =============================================================================
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - planner_server
      - controller_server
      - smoother_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
