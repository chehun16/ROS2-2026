version: "3.8"

# =============================================================================
# BEV Navigation Docker Compose
#
# Supported platforms:
#   Ubuntu 22.04/24.04 : DISPLAY=$DISPLAY docker compose up bev_full
#   macOS (XQuartz)    : ./run.sh run
#   Windows (WSL2)     : docker compose up bev_full  (VcXsrv must be running)
#
# GUI prerequisite by platform:
#   Ubuntu  → xhost +local:docker
#   macOS   → XQuartz running + xhost +localhost
#   Windows → VcXsrv running with "Disable access control" checked
# =============================================================================

x-ros-common: &ros-common
  build:
    context: .
    dockerfile: Dockerfile
    platform: linux/amd64   # Required for Apple Silicon (Rosetta); safe on x86_64
  environment:
    # DISPLAY resolution priority:
    #   1. Value passed via environment (Ubuntu: $DISPLAY, Windows WSL2: auto-set)
    #   2. host.docker.internal:0 fallback (macOS XQuartz / Windows VcXsrv)
    - DISPLAY=${DISPLAY:-host.docker.internal:0}
    - QT_X11_NO_MITSHM=1
    - TURTLEBOT3_MODEL=waffle
    - ROS_DOMAIN_ID=0
    - LIBGL_ALWAYS_INDIRECT=${LIBGL_ALWAYS_INDIRECT:-0}
  volumes:
    - ./src:/ros2_ws/src               # Live source mount
    - /tmp/.X11-unix:/tmp/.X11-unix    # X11 socket (Linux only; ignored on Mac/Windows)
  # network_mode: host is intentionally omitted.
  # All ROS2 nodes run inside a single container (bev_full), so DDS communication
  # works over the container's loopback without host networking.
  # host mode is also unsupported on Windows Docker Desktop.
  stdin_open: true
  tty: true

services:

  # ---------------------------------------------------------------------------
  # Full system: Gazebo + SLAM + Nav2 + project nodes + RViz2 in one container
  # ---------------------------------------------------------------------------
  bev_full:
    <<: *ros-common
    container_name: bev_navigation_full
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        source /ros2_ws/install/setup.bash &&
        ros2 launch bev_navigation bev_navigation.launch.py
      "

  # ---------------------------------------------------------------------------
  # Development shell: attach for manual build/run after code changes
  # ---------------------------------------------------------------------------
  dev:
    <<: *ros-common
    container_name: bev_navigation_dev
    command: bash
    volumes:
      - ./src:/ros2_ws/src

  # ---------------------------------------------------------------------------
  # Gazebo only: useful for verifying simulator independently
  # ---------------------------------------------------------------------------
  gazebo:
    <<: *ros-common
    container_name: bev_gazebo
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        export TURTLEBOT3_MODEL=waffle &&
        ros2 launch turtlebot3_gazebo turtlebot3_house.launch.py
      "

  # ---------------------------------------------------------------------------
  # RViz2 only: useful for verifying visualization independently
  # ---------------------------------------------------------------------------
  rviz:
    <<: *ros-common
    container_name: bev_rviz
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        source /ros2_ws/install/setup.bash &&
        ros2 run rviz2 rviz2 -d /ros2_ws/install/bev_navigation/share/bev_navigation/config/bev_navigation.rviz
      "
